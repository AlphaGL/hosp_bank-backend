{% extends "base.html" %}

{% block nav_inventory %}active{% endblock %}

{% block extra_scripts %}
{{ block.super }}
<style>
    /* ── Inventory-wide shared styles ─────────────────────────────────── */
    .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 24px;
    }
    .page-header-left h1 {
        font-size: 22px;
        font-weight: 700;
        color: var(--text-primary);
        margin: 0;
    }
    .page-header-left .breadcrumb {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
    }
    .page-header-left .breadcrumb a {
        color: var(--blue);
        text-decoration: none;
    }
    .page-header-left .breadcrumb a:hover { text-decoration: underline; }

    /* ── Status badges ─────────────────────────────────────────────────── */
    .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11.5px;
        font-weight: 600;
        white-space: nowrap;
    }
    .badge-success  { background: var(--success-light); color: var(--success); }
    .badge-danger   { background: var(--danger-light);  color: var(--danger); }
    .badge-warn     { background: var(--warn-light);    color: var(--warn); }
    .badge-blue     { background: var(--blue-light);    color: var(--blue); }
    .badge-purple   { background: var(--purple-soft);   color: var(--purple); }
    .badge-neutral  { background: var(--surface-2);     color: var(--text-secondary); }
    .badge-teal     { background: var(--teal-light);    color: var(--teal); }

    /* ── Filter bar ─────────────────────────────────────────────────────── */
    .filter-bar {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 16px 20px;
        margin-bottom: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: flex-end;
    }
    .filter-bar .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-bar label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-bar .btn-filter { align-self: flex-end; }

    /* ── Data table ─────────────────────────────────────────────────────── */
    .data-table-wrap {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
    }
    .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13.5px;
    }
    .data-table thead th {
        background: var(--surface);
        padding: 10px 16px;
        text-align: left;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
    }
    .data-table tbody tr {
        border-bottom: 1px solid var(--border-light);
        transition: background var(--transition);
    }
    .data-table tbody tr:last-child { border-bottom: none; }
    .data-table tbody tr:hover { background: var(--surface); }
    .data-table td {
        padding: 11px 16px;
        color: var(--text-primary);
        vertical-align: middle;
    }
    .data-table td.muted { color: var(--text-secondary); font-size: 12.5px; }
    .data-table td.mono  { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

    /* ── Detail card ─────────────────────────────────────────────────────── */
    .detail-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 24px;
    }
    .detail-card h2 {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-light);
    }
    .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
    }
    .detail-field label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        display: block;
        margin-bottom: 4px;
    }
    .detail-field span {
        font-size: 14px;
        color: var(--text-primary);
        font-weight: 500;
    }

    /* ── Stat cards ─────────────────────────────────────────────────────── */
    .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
    }
    .stat-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 18px 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .stat-card .stat-label {
        font-size: 11.5px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }
    .stat-card .stat-value {
        font-size: 28px;
        font-weight: 800;
        color: var(--text-primary);
        line-height: 1;
    }
    .stat-card .stat-sub {
        font-size: 12px;
        color: var(--text-muted);
    }
    .stat-card.danger  { border-left: 4px solid var(--danger); }
    .stat-card.warn    { border-left: 4px solid var(--warn); }
    .stat-card.success { border-left: 4px solid var(--success); }
    .stat-card.blue    { border-left: 4px solid var(--blue); }
    .stat-card.teal    { border-left: 4px solid var(--teal); }

    /* ── Form card ──────────────────────────────────────────────────────── */
    .form-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 28px 32px;
        max-width: 760px;
    }
    .form-row { margin-bottom: 20px; }
    .form-row label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 6px;
    }
    .form-row .help-text {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 4px;
    }
    .form-row .errorlist {
        list-style: none;
        font-size: 12px;
        color: var(--danger);
        margin-top: 4px;
    }
    .form-control, .form-select {
        width: 100%;
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-family: inherit;
        font-size: 13.5px;
        color: var(--text-primary);
        background: var(--white);
        transition: border-color var(--transition), box-shadow var(--transition);
        outline: none;
    }
    .form-control:focus, .form-select:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px var(--blue-soft);
    }
    .form-check { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .form-check-input { width: 16px; height: 16px; cursor: pointer; }
    .form-check label { font-weight: 500; font-size: 13.5px; }
    .form-section-title {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        margin: 24px 0 14px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border-light);
    }
    .form-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-cols-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) {
        .form-cols, .form-cols-3 { grid-template-columns: 1fr; }
    }

    /* ── Pagination ─────────────────────────────────────────────────────── */
    .pagination {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 16px 20px;
        border-top: 1px solid var(--border-light);
        justify-content: center;
    }
    .page-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 34px;
        height: 34px;
        padding: 0 8px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--white);
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        transition: background var(--transition), border-color var(--transition), color var(--transition);
    }
    .page-link:hover { background: var(--surface); color: var(--blue); border-color: var(--blue); }
    .page-link.active { background: var(--blue); color: white; border-color: var(--blue); }
    .page-link.disabled { opacity: 0.4; pointer-events: none; }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
        text-align: center;
        padding: 60px 24px;
        color: var(--text-muted);
    }
    .empty-state svg {
        width: 48px; height: 48px;
        opacity: 0.3;
        margin-bottom: 12px;
    }
    .empty-state p { font-size: 14px; margin-bottom: 16px; }

    /* ── Action buttons (reused) ─────────────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 13.5px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; transition: opacity var(--transition), box-shadow var(--transition); }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-danger  { background: var(--danger); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-warn    { background: var(--warn); color: white; }
    .btn-ghost   { background: var(--surface-2); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-sm      { padding: 5px 12px; font-size: 12.5px; }
    .btn-icon    { padding: 7px; border-radius: var(--radius); background: var(--surface-2); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; display: inline-flex; transition: background var(--transition); }
    .btn-icon:hover { background: var(--border); }
    .btn-icon svg { width: 15px; height: 15px; }
</style>
{% endblock %}
